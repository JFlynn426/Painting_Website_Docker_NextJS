# Docker Compose for Cloudflare Full Mode Deployment
# This configuration is for home server deployment with:
# - Cloudflare handling SSL at the edge (Full mode)
# - NGINX handling SSL termination with self-signed certificate
# - Internal HTTP communication between containers

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: artgallery-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQLSERVER_SA_PASSWORD}
      - MSSQL_PID=Web
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SQLSERVER_SA_PASSWORD} -C -Q 'SELECT 1' -b -o /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - artgallery-network
    restart: unless-stopped
    # Note: SQL Server is NOT exposed to the internet for security

  api:
    build:
      context: ../ServerApp
      dockerfile: ServerApp.Api/Dockerfile
      target: final
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ArtGallery;User Id=sa;Password=${SQLSERVER_SA_PASSWORD};TrustServerCertificate=True;
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - artgallery-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Note: API is NOT exposed to the internet, only accessible via NGINX

  frontend:
    build:
      context: ../clientapp
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      SERVER_API_URL: ${SERVER_API_URL}
    networks:
      - artgallery-network
    restart: unless-stopped
    # Note: Frontend is NOT exposed directly, only accessible via NGINX

  nginx:
    image: nginx:alpine
    container_name: artgallery-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_HEALTH_PORT:-8080}:8080"
    volumes:
      - ./nginx/nginx.cloudflare.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - artgallery-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health", "-o", "/dev/null" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sqlserver_data:
  nginx_logs:


networks:
  artgallery-network:
    driver: bridge
