services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: artgallery-sql-prod
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD_FILE: /run/secrets/sqlserver_sa_password
      MSSQL_PID: Express
    volumes:
      - sqlserver_data:/var/opt/mssql
    secrets:
      - sqlserver_sa_password
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$(cat /run/secrets/sqlserver_sa_password) -C -Q 'SELECT 1' -b -o /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - artgallery-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G

  api:
    build:
      context: ../ServerApp
      dockerfile: ./ServerApp.Api/Dockerfile
      target: final
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ArtGallery;User Id=sa;Password=${SQLSERVER_SA_PASSWORD};TrustServerCertificate=True;
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - artgallery-network
    restart: unless-stopped
    read_only: true  # Security: Prevent filesystem modifications
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  frontend:
    build:
      context: ../clientapp
      dockerfile: Dockerfile
      target: production
    user: "1001:1001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    networks:
      - artgallery-network
    restart: unless-stopped
    read_only: true  # Security: Prevent filesystem modifications
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: artgallery-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_HEALTH_PORT:-8080}:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    read_only: true  # Security: Prevent filesystem modifications
    tmpfs:           # Temporary filesystems for required writable directories
      - /var/log/nginx
      - /var/cache/nginx
      - /run
      - /etc/nginx/conf.d
      - /tmp
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - artgallery-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  sqlserver_data:
  # Note: nginx_logs volume removed - replaced with tmpfs for read-only container

networks:
  artgallery-network:
    driver: bridge

secrets:
  sqlserver_sa_password:
    file: ./secrets/sqlserver_sa_password