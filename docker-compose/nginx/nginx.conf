# ============================================================================
# NGINX Configuration for Cloudflare Full SSL Mode
# ============================================================================
# This configuration is designed for use with Cloudflare's "Full" SSL mode:
# - Visitor → Cloudflare: HTTPS (encrypted)
# - Cloudflare → Origin (this server): HTTPS with self-signed certificate
#
# Cloudflare Settings Required:
# - SSL/TLS Encryption Mode: Full
# - Always Use HTTPS: On
# - Automatic HTTPS Rewrites: On
# ============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ========================================================================
    # Cloudflare Real IP Configuration
    # ========================================================================
    # Use Cloudflare's CF-Connecting-IP header for real client IP
    # This ensures logs and applications see the actual visitor IP, not Cloudflare's
    # ========================================================================
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/20;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/12;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 104.28.0.0/14;
    set_real_ip_from 104.32.0.0/11;
    set_real_ip_from 104.40.0.0/13;
    set_real_ip_from 104.46.0.0/15;
    set_real_ip_from 104.48.0.0/12;
    set_real_ip_from 104.56.0.0/13;
    set_real_ip_from 104.64.0.0/10;
    set_real_ip_from 104.128.0.0/10;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 131.0.74.0/23;
    set_real_ip_from 131.0.76.0/22;
    set_real_ip_from 131.0.78.0/23;
    set_real_ip_from 131.0.80.0/17;
    set_real_ip_from 131.0.128.0/17;
    set_real_ip_from 142.250.185.0/24;
    set_real_ip_from 142.251.10.0/24;
    set_real_ip_from 142.251.11.0/24;
    set_real_ip_from 142.251.12.0/22;
    set_real_ip_from 142.251.16.0/24;
    set_real_ip_from 142.251.20.0/23;
    set_real_ip_from 142.251.24.0/24;
    set_real_ip_from 142.251.28.0/22;
    set_real_ip_from 142.251.32.0/20;
    set_real_ip_from 142.251.40.0/22;
    set_real_ip_from 142.251.48.0/20;
    set_real_ip_from 142.251.56.0/22;
    set_real_ip_from 142.251.64.0/18;
    set_real_ip_from 142.251.128.0/17;
    set_real_ip_from 172.217.0.0/16;
    set_real_ip_from 172.253.0.0/16;
    set_real_ip_from 173.194.0.0/16;
    set_real_ip_from 209.85.128.0/17;
    set_real_ip_from 216.58.192.0/19;
    set_real_ip_from 216.239.32.0/19;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2607:f8b0::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a00:1450::/32;
    set_real_ip_from 2c0f:fb50::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Logging format - includes Cloudflare real IP
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Upstream definitions
    upstream api_backend {
        server api:8080;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:3000;
        keepalive 32;
    }

    # Health check endpoint for load balancers
    server {
        listen 8080;
        server_name ggpaintings.com www.ggpaintings.com _;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name ggpaintings.com www.ggpaintings.com;

        # SSL configuration (self-signed certificate for Cloudflare Full mode)
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS - removed preload for easier initial setup with Cloudflare
        # Cloudflare handles HSTS at the edge, so this is a backup
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;


        # API proxy
        # Preserve the /api prefix when proxying to backend
        location /api/ {
            proxy_pass http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            # Use Cloudflare real IP header for accurate client IP
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Pass Cloudflare headers to backend
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header CF-IPCountry $http_cf_ipcountry;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Frontend proxy - proxy all requests to Next.js
        location / {
            proxy_pass http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            # Use Cloudflare real IP header for accurate client IP
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Pass Cloudflare headers to backend
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header CF-IPCountry $http_cf_ipcountry;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTP to HTTPS redirect
    # Note: Cloudflare also handles this, but keeping for direct connections
    server {
        listen 80;
        server_name ggpaintings.com www.ggpaintings.com;
        return 301 https://$host$request_uri;
    }
}